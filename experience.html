<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>카드 체험하기 | 시그마</title><link rel="stylesheet" href="site.css"></head><body><header class="top wrap"><a class="brand" href="index.html"><b>Σ</b> 시그마</a><nav><a href="experience.html">체험하기</a><a href="principle.html">원리 보기</a></nav></header><main><div class="wrap page-head"><div class="kicker">BINARY CARD EXPERIENCE</div><h1>숫자를 마음속에<br>하나 정해 보세요</h1><p>1부터 60 중 하나를 고른 뒤, 각 카드에 그 숫자가 있으면 ‘있어요’를 눌러 주세요.</p></div><div class="wrap grid2"><section class="panel"><div class="kicker" id="progress">카드 1 / 6</div><div>이 카드의 기준값</div><div class="value" id="value">1</div><div class="nums" id="nums"></div><h3>떠올린 숫자가 있나요?</h3><div class="answers"><button class="yes" id="yes">있어요</button><button id="no">없어요</button></div></section><aside class="panel"><h2>내 답으로 만든 숫자</h2><p>‘있어요’라고 답한 카드의 기준값만 더해요.</p><div id="expr">아직 선택 전</div><div class="sum" id="sum">0</div><div class="bits" id="bits"></div><div class="note" id="note">첫 카드부터 시작해 볼까요?</div><div class="actions"><button class="btn" id="restart">처음부터</button><a class="btn primary" href="principle.html">왜 맞는지 보기 →</a></div></aside></div></main><footer><div class="wrap">Σ 시그마 수학동아리</div></footer><script>const V=[1,2,4,8,16,32];let s=0,y=[];const $=q=>document.querySelector(q);function draw(){let done=s===6,v=V[Math.min(s,5)],total=y.reduce((a,b)=>a+b,0);$('#progress').textContent=done?'완료!':`카드 ${s+1} / 6`;$('#value').textContent=v;$('#nums').innerHTML=Array.from({length:60},(_,i)=>i+1).filter(n=>n&v).map(n=>`<span>${n}</span>`).join('');$('#expr').textContent=y.length?y.join(' + '):'아직 선택 전';$('#sum').textContent=total;$('#bits').innerHTML=[...V].reverse().map(n=>`<span class="${y.includes(n)?'on':''}">${y.includes(n)?1:0}</span>`).join('');$('#note').textContent=done?`정답은 ${total}! 떠올린 숫자가 맞나요?`:`현재까지 ${total}이에요.`;$('#yes').disabled=done;$('#no').disabled=done}function answer(a){if(s===6)return;if(a)y.push(V[s]);s++;draw()}$('#yes').onclick=()=>answer(1);$('#no').onclick=()=>answer(0);$('#restart').onclick=()=>{s=0;y=[];draw()};draw()</script></body></html>
