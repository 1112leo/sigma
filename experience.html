<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>카드 체험하기 | 시그마</title><link rel="stylesheet" href="site.css"><link rel="stylesheet" href="detail.css"></head>
<body class="sub-page"><header class="top wrap"><a class="brand" href="index.html"><b>Σ</b> 시그마</a><nav><a href="experience.html">체험하기</a><a href="principle.html">원리 보기</a></nav></header>
<main><section class="sub-hero"><div class="wrap sub-hero-inner"><div class="kicker">BINARY CARD EXPERIENCE</div><h1>숫자를 하나<br>마음속에 정하세요</h1><p>1부터 60 중 하나를 고른 뒤, 각 카드에 그 숫자가 있는지만 알려 주세요.</p></div></section>
<div class="wrap content-stack"><section class="game-shell"><article class="game-card"><div class="card-top"><div><div class="place-label">이 카드의 기준값</div><div class="place-value" id="value">1</div></div><span class="counter" id="progress">카드 1 / 6</span></div><div class="number-grid" id="nums"></div><div class="game-question">떠올린 숫자가 이 카드에 있나요?</div><div class="game-buttons"><button class="yes" id="yes">있어요</button><button class="no" id="no">없어요</button></div></article>
<aside class="score-card"><h2>내 답으로 만든 숫자</h2><p>‘있어요’라고 답한 카드값만 더해요.</p><div class="formula-box"><small>기준값의 합</small><div class="formula-expression" id="expr">아직 선택 전</div><div class="formula-total" id="sum">0</div></div><div class="bit-row" id="bits"></div><div class="result-note" id="note">첫 카드부터 시작해 볼까요?</div><div class="score-actions"><button class="btn" id="restart">처음부터 다시</button><a class="btn primary" href="principle.html">왜 맞는지 보기 →</a></div></aside></section></div></main><footer><div class="wrap">Σ 시그마 수학동아리</div></footer>
<script>const V=[1,2,4,8,16,32];let s=0,y=[];const $=q=>document.querySelector(q);function draw(){let done=s===6,v=V[Math.min(s,5)],total=y.reduce((a,b)=>a+b,0);$('#progress').textContent=done?'완료!':`카드 ${s+1} / 6`;$('#value').textContent=v;$('#nums').innerHTML=Array.from({length:60},(_,i)=>i+1).filter(n=>n&v).map(n=>`<span>${n}</span>`).join('');$('#expr').textContent=y.length?y.join(' + '):'아직 선택 전';$('#sum').textContent=total;$('#bits').innerHTML=[...V].reverse().map(n=>`<div class="bit-chip ${y.includes(n)?'on':''}"><b>${y.includes(n)?1:0}</b><small>${n}</small></div>`).join('');$('#note').textContent=done?`정답은 ${total}! 떠올린 숫자가 맞나요?`:`현재까지 ${total}이에요.`;$('#yes').disabled=done;$('#no').disabled=done}function answer(a){if(s===6)return;if(a)y.push(V[s]);s++;draw()}$('#yes').onclick=()=>answer(1);$('#no').onclick=()=>answer(0);$('#restart').onclick=()=>{s=0;y=[];draw()};draw()</script></body></html>
