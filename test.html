<!doctype html>
<html lang="ko">
<head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>이해도 테스트 | 시그마</title><link rel="stylesheet" href="site.css"><link rel="stylesheet" href="detail.css"></head>
<body class="sub-page">
  <header class="top wrap"><a class="brand" href="index.html"><b>Σ</b> 시그마</a><nav><a href="principle.html">원리 보기</a><a href="experience.html">체험하기</a><a href="test.html">테스트</a></nav></header>
  <main class="quiz-wrap">
    <section class="quiz-card" id="quizCard">
      <div id="quizActive">
        <div class="kicker">ONE QUESTION TEST</div>
        <h1>카드값을 더해<br>숫자를 맞혀 보세요</h1>
        <p>다음 카드에 내가 고른 숫자가 모두 있었다면, 고른 숫자는 무엇일까요?</p>
        <div class="quiz-cards" id="quizCards"></div>
        <form class="quiz-form" id="quizForm"><input id="quizAnswer" type="number" min="1" max="60" inputmode="numeric" placeholder="정답 숫자" aria-label="정답 숫자" required><button type="submit">정답 확인</button></form>
        <div class="quiz-feedback" id="quizFeedback" role="status" aria-live="polite"></div>
      </div>
      <div class="quiz-complete" id="quizComplete" hidden><div class="check">✓</div><h2>정답이에요!🎉</h2><p>이 화면을 진행자에게 보여주고 간식을 받아 가세요.</p><a class="btn" href="index.html">처음으로 돌아가기</a></div>
    </section>
  </main>
  <footer><div class="wrap">Σ 시그마 수학동아리</div></footer>
  <script>
    const questions=[{cards:[16,8,2],answer:26},{cards:[32,4,1],answer:37},{cards:[32,16,8,4],answer:60}];
    const active=document.getElementById('quizActive');
    const complete=document.getElementById('quizComplete');
    const question=questions[Math.floor(Math.random()*questions.length)];
    document.getElementById('quizCards').innerHTML=question.cards.map(value=>`<span class="quiz-card-chip">${value} 카드</span>`).join('');
    document.getElementById('quizForm').addEventListener('submit',event=>{
      event.preventDefault();
      const input=document.getElementById('quizAnswer');
      const feedback=document.getElementById('quizFeedback');
      if(Number(input.value)===question.answer){
        active.hidden=true;complete.hidden=false;
      }else{
        feedback.className='quiz-feedback show wrong';
        feedback.textContent='다시 생각해 보세요. 숫자가 있던 카드의 값을 모두 더하면 됩니다.';
        input.focus();input.select();
      }
    });
  </script>
<script src="reveal.js"></script></body>
</html>
